<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>築匠 Artisan Studio </title>
    
    <!-- PWA Meta Tags -->
    <meta name="application-name" content=" 報價系統" />
    <meta name="description" content="專業的裝修與傢俬報價系統，支援離線保存在本地，與 PDF / Excel 匯出功能。" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F5F5F0" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#020617" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content=" 報價系統" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/icon-512.png" />
    
    <!-- Service Worker Registration -->
    <script>
      // Only register Service Worker when running as top window (standalone PWA or top-level page)
      // to avoid iframe preview sandbox redirect & cross-origin worker errors.
      if ('serviceWorker' in navigator) {
        if (window.self === window.top) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
              .then((reg) => {
                console.log('Service Worker 註冊成功，作用域：', reg.scope);
                if (reg && typeof reg.update === 'function') {
                  reg.update().catch(() => {});
                }
              })
              .catch((err) => {
                console.warn('Service Worker 註冊暫停（預覽環境或權限受限）：', err);
              });
          });
        } else {
          // Unregister any active Service Workers in iframe sandbox mode
          navigator.serviceWorker.getRegistrations().then((registrations) => {
            for (let registration of registrations) {
              registration.unregister().catch(() => {});
            }
          }).catch(() => {});
        }
      }
    </script>
  </head>
  <body class="bg-[#F5F5F0]">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
